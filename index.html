<body>
    <h1>I Nostri Prodotti</h1>
    <div id="product-list" class="container">
        </div>

    <script>
        // Dati di esempio (puoi aggiungerne quanti ne vuoi)
        const products = [
            { id: 1, name: "Account Spotify 1 mese", price: "4€", img: "https://it.wikipedia.org/wiki/File:Spotify_icon.png" },
            { id: 2, name: "Prodotto Silver", price: "5.00€", img: "https://picsum.photos/200/150?random=2" },
            { id: 3, name: "Prodotto Bronze", price: "2.50€", img: "https://picsum.photos/200/150?random=3" }
        ];

        const container = document.getElementById('product-list');

        // Ciclo per creare il codice HTML di ogni prodotto
        products.forEach(p => {
            container.innerHTML += `
                <div class="card">
                    <img src="${p.img}" alt="${p.name}">
                    <h3>${p.name}</h3>
                    <p class="price">${p.price}</p>
                    <button onclick="buy(${p.id})">Acquista</button>
                </div>
            `;
        });

        function buy(id) {
            const p = products.find(item => item.id === id);
            tg.showAlert(`Hai scelto: ${p.name}`);
        }
    </script>
</body>
