<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>La Mia Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; 
               background-color: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); }
        button { padding: 10px 20px; background: #0088cc; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Benvenuto nella Mini App!</h1>
    <p id="user-name">Caricamento...</p>
    <button onclick="tg.close()">Chiudi App</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready(); // Avvisa Telegram che l'app è pronta
        
        // Recupera il nome dell'utente dai dati di Telegram
        const user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-name').innerText = `Ciao, ${user.first_name}!`;
        }
    </script>
</body>
</html>
