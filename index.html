<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Negozio Mini App</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        /* Qui dentro mettiamo l'aspetto estetico */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        h1 { font-size: 24px; margin-bottom: 20px; }

        .container {
            display: grid;
            grid-template-columns: 1fr; /* Una colonna per mobile */
            gap: 20px;
        }

        .card {
            background-color: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: transform 0.2s;
        }

        .card img {
            width: 100%;
            height: 150px;
            border-radius: 10px;
            object-fit: cover;
        }

        .price {
            font-size: 1.4em;
            font-weight: bold;
            color: #31b545; /* Verde per il prezzo */
            margin: 10px 0;
        }

        button     {
        width: 100%;
        padding: 12px;
        background-color: #0088cc; /* Colore azzurro Telegram */
        color: white;
        border: none;
        border-radius: 10px;
        font-weight: bold;
        cursor: pointer;
        font-size: 16px;
        text-transform: uppercase;
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <h1>I Nostri Prodotti</h1>
    
    <div id="product-list" class="container">
        </div>

    <script>
        const tg = window.Telegram.WebApp;
tg.ready();
tg.expand();

// Sostituisci "TUO_USERNAME" con il tuo vero username di Telegram senza la @
const mioUsername = "TUO_USERNAME"; 

const products = [
    { id: 1, name: "Account Spotify - 1 mese", price: "4.00€", img: "https://upload.wikimedia.org/wikipedia/commons/7/75/Spotify_icon.png" },
    { id: 2, name: "Burger Deluxe", price: "12.50€", img: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400" },
    { id: 3, name: "Sushi Set", price: "18.00€", img: "https://images.unsplash.com/photo-1579871494447-9811cf80d66c?w=400" }
];

const container = document.getElementById('product-list');

products.forEach(p => {
    container.innerHTML += `
        <div class="card">
            <img src="${p.img}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p class="price">${p.price}</p>
            <button onclick="contatta('${p.name}')">Contatta</button>
        </div>
    `;
});

function contatta(nomeProdotto) {
    tg.HapticFeedback.impactOccurred('medium');
    
    // Creiamo il link al tuo profilo. 
    // Opzionale: puoi aggiungere un messaggio preimpostato se il link lo supporta, 
    // ma il redirect base è t.me/username
    const url = `https://t.me/Umbyy0`;
    
    tg.openTelegramLink(url);
}
            });
        }
    </script>
</body>
</html>
