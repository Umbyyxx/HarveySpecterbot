<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harvey Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --primary: #0088cc;
            --bg: var(--tg-theme-bg-color, #ffffff);
            --text: var(--tg-theme-text-color, #000000);
            --sec-bg: var(--tg-theme-secondary-bg-color, #f5f5f5);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Gestione Schermate */
        .page {
            display: none; /* Nasconde le pagine di default */
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }

        .active { display: block; } /* Mostra la pagina attiva */

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Homepage */
        .hero-img {
            width: 100%;
            max-width: 300px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .badge {
            background: #31b545;
            color: white;
            padding: 5px 15px;
            border-radius: 50px;
            font-size: 14px;
            font-weight: bold;
            display: inline-block;
            margin-bottom: 10px;
        }

        /* Bottoni */
        .main-button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
        }

        .back-button {
            background: none;
            border: 1px solid var(--primary);
            color: var(--primary);
            margin-bottom: 20px;
            padding: 8px 15px;
            border-radius: 8px;
        }

        /* Griglia Account */
        .account-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .account-card {
            background: var(--sec-bg);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            transition: 0.2s;
        }

        .account-card:active { transform: scale(0.95); }

        .account-card img {
            width: 60px;
            height: 60px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        h1 { margin: 10px 0; font-size: 24px; }
        p { opacity: 0.8; line-height: 1.5; }
    </style>
</head>
<body>

    <div id="home-page" class="page active">
        <img src="https://i.pinimg.com/736x/81/98/c5/8198c5c224e095d6014a01b6e50f2390.jpg" class="hero-img" alt="Harvey Specter">
        <div class="badge">ECCELLENZA ITALIANA</div>
        <h1>Miglior Shop di Telegram Italia</h1>
        <p>Affidabilità e qualità garantita.<br><b>Accetto Escrow</b> per la tua massima sicurezza.</p>
        
        <button class="main-button" onclick="showPage('accounts-page')">VAI AGLI ACCOUNT</button>
    </div>

    <div id="accounts-page" class="page">
        <button class="back-button" onclick="showPage('home-page')">← Torna Home</button>
        <h1>Scegli il servizio</h1>
        <p>Seleziona l'account che desideri acquistare:</p>

        <div class="account-grid">
            <div class="account-card" onclick="contatta('Spotify')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/7/75/Spotify_icon.png" alt="Spotify">
                <h3>Spotify</h3>
            </div>

            <div class="account-card" onclick="contatta('Netflix')">
                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/75/Netflix_icon.svg/500px-Netflix_icon.svg.png?_=20220806170125" alt="Netflix">
                <h3>Netflix</h3>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const mioUsername = "Umbyy0";

        // Funzione per cambiare pagina
        function showPage(pageId) {
            tg.HapticFeedback.impactOccurred('light');
            
            // Nascondi tutte le pagine
            document.querySelectorAll('.page').forEach(page => {
                page.classList.remove('active');
            });

            // Mostra quella selezionata
            document.getElementById(pageId).classList.add('active');
            
            // Se siamo nella pagina account, mostriamo il tasto Back nativo di Telegram
            if (pageId === 'accounts-page') {
                tg.BackButton.show();
                tg.BackButton.onClick(() => showPage('home-page'));
            } else {
                tg.BackButton.hide();
            }
        }

        function contatta(servizio) {
            tg.HapticFeedback.notificationOccurred('success');
            tg.showConfirm(`Vuoi contattarmi per acquistare un account ${servizio}?`, (confirmed) => {
                if (confirmed) {
                    tg.openTelegramLink(`https://t.me/${mioUsername}`);
                }
            });
        }
    </script>
</body>
</html>
